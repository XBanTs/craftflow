{% extends 'base.html' %}
{% block title %}Delete Portfolio Item | CraftFlow{% endblock %}
{% block content %}
<h1>Delete Portfolio Item</h1>
<p>Are you sure you want to delete "{{ item.title }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'profile' request.user.pk %}" class="btn">Cancel</a>
</form>
{% endblock %}
