<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px;">
    <div style="max-width: 500px; margin: auto; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
        <div style="background: #4F46E5; padding: 20px; text-align: center;">
            <h1 style="color: white; margin: 0;">Welcome to CraftFlow</h1>
        </div>
        <div style="padding: 30px;">
            <p>Hi {{ user.username }},</p>
            <p>Please verify your email address to complete your registration and build trust on the platform.</p>
            <div style="text-align: center; margin: 30px 0;">
                <a href="{{ verify_url }}" style="display: inline-block; background: #4F46E5; color: white; padding: 12px 30px; text-decoration: none; border-radius: 5px; font-weight: bold;">Verify Email</a>
            </div>
            <p style="color: #666; font-size: 12px;">If you did not create an account, please ignore this email.</p>
        </div>
    </div>
</body>
</html>
