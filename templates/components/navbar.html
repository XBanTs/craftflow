<!-- craftflow/templates/components/navbar.html -->
<nav class="navbar">
    <div class="container navbar-inner">
        <!-- Brand -->
        <a href="{% url 'home' %}" class="navbar-brand">CraftFlow</a>

        <!-- Hamburger button (visible on mobile) -->
        <button class="navbar-toggle" id="navbarToggle" aria-label="Toggle navigation">
            ☰
        </button>

        <!-- Links container -->
        <div class="navbar-links" id="navbarLinks">
            {% if request.user.is_authenticated %}
                <a href="{% url 'dashboard' %}" class="nav-link">Dashboard</a>
                <a href="{% url 'job_list' %}" class="nav-link">Browse Jobs</a>
                <a href="{% url 'job_create' %}" class="nav-link">Post a Job</a>
                <a href="{% url 'saved_jobs' %}" class="nav-link">Saved Jobs</a>
                <a href="{% url 'profile' request.user.pk %}" class="nav-link">My Profile</a>
                <form method="post" action="{% url 'logout' %}" class="logout-form">
                    {% csrf_token %}
                    <button type="submit" class="nav-link btn-logout">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="nav-link">Login</a>
                <a href="{% url 'register' %}" class="nav-link">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<script>
    // Mobile navbar toggle
    document.addEventListener('DOMContentLoaded', function () {
        const toggleBtn = document.getElementById('navbarToggle');
        const links = document.getElementById('navbarLinks');
        if (toggleBtn && links) {
            toggleBtn.addEventListener('click', function () {
                links.classList.toggle('active');
            });
        }
    });
</script>
